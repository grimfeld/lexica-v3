name = "lexica-ai-proxy"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Secrets are set with `wrangler secret put <NAME>` (never committed):
#   JWT_SECRET              shared HS256 secret (also used by the client gate)
#   ANTHROPIC_API_KEY       app provider keys — server-side only (ADR-0006)
#   OPENAI_API_KEY
#   ELEVENLABS_API_KEY
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   STRIPE_PRICE_ID
#   PB_URL                  PocketBase base URL
#   PB_ADMIN_TOKEN          PocketBase admin token (to set the entitlement flag)
